# Builds and publishes the Olisar desktop app to a GitHub Release when a v* tag is pushed —
# macOS (Apple Silicon .dmg) and Windows (NSIS .exe) in parallel. The in-app updater
# (desktop/updater.js) then picks up the new release automatically.
#
# Both jobs run electron-builder --publish always (releaseType "release" in package.json),
# so they upload their installers to the same published v<tag> release. The app is unsigned
# (CSC_IDENTITY_AUTO_DISCOVERY=false). See RELEASING.md.
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # create the release and upload assets

jobs:
  macos:
    runs-on: macos-14 # Apple Silicon → arm64 .dmg
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: desktop/funnel-sidecar/go.mod

      - name: Build the Tailscale Funnel helper
        run: |
          cd desktop/funnel-sidecar
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o ../resources/olisar-funnel .

      - name: Set up uv + Python
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.13'

      - name: Install Python dependencies
        run: uv sync --all-extras

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build the dashboard
        run: |
          cd web
          npm ci
          npm run build

      - name: Package the backend (PyInstaller)
        run: uv run pyinstaller desktop/backend.spec --noconfirm --clean

      - name: Build & publish the desktop app
        working-directory: desktop
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false' # unsigned build
        run: |
          npm install
          npm run release

  windows:
    runs-on: windows-latest # x64 NSIS .exe
    defaults:
      run:
        shell: bash # uniform shell for the build commands (git-bash ships on the runner)
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: desktop/funnel-sidecar/go.mod

      - name: Build the Tailscale Funnel helper
        run: |
          cd desktop/funnel-sidecar
          # -H windowsgui: GUI subsystem so the helper doesn't pop a console window
          # (its stdout is still captured by the backend's pipe).
          go build -ldflags="-s -w -H windowsgui" -o ../resources/olisar-funnel.exe .

      - name: Set up uv + Python
        uses: astral-sh/setup-uv@v5
        with:
          # 3.12, not 3.13: quickjs 1.19.4 ships a cp312 win_amd64 wheel but no cp313 one,
          # so on 3.13 uv builds it from source and MSVC rejects its GCC-only compile flags.
          # (macOS stays on 3.13 — clang builds quickjs from source fine.)
          python-version: '3.12'

      - name: Install Python dependencies
        run: uv sync --all-extras

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build the dashboard
        run: |
          cd web
          npm ci
          npm run build

      - name: Package the backend (PyInstaller)
        run: uv run pyinstaller desktop/backend.spec --noconfirm --clean

      - name: Build & publish the desktop app
        working-directory: desktop
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm install
          npm run release
