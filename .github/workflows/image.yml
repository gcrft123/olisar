# Build and publish the multi-arch server image to GHCR, so the deploy bootstrap pulls
# a prebuilt image instead of building on a tiny free VM. Public image →
# ghcr.io/gcrft123/olisar:{latest, <sha>, <tag>}.
name: Server image

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "olisar/**"
      - "api/**"
      - "bot/**"
      - "scripts/**"
      - "web/**"
      - "deploy/Dockerfile"
      - "desktop/funnel-sidecar/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/image.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3        # arm64 emulation for the multi-arch build
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=tag
            type=sha

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
